global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      # The *-rp2-coordinator hostnames: see the rp2_coordinator job below.
      - targets:
          [
            'localhost:9100',
            'sb-staging:9100',
            'sb-prod:9100',
            'staging-rp2-coordinator:9100',
            'rp2-coordinator:9100',
          ]

  - job_name: 'app_server'
    static_configs:
      - targets: ['sb-staging:80', 'sb-prod:80']

  - job_name: 'server_rs'
    static_configs:
      - targets: ['sb-staging:8001', 'sb-prod:8001']

  # The coordinator boxes' tailnet hostnames (each box's TAILSCALE_HOSTNAME):
  # staging-rp2-coordinator is the staging box; rp2-coordinator is the
  # production box, listed ahead of its standup, so it reads as a down target
  # until that box exists.
  - job_name: 'rp2_coordinator'
    static_configs:
      - targets: ['staging-rp2-coordinator:14911', 'rp2-coordinator:14911']
