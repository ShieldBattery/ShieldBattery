global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      # rp2-coordinator: see the rp2_coordinator job below for what this
      # hostname is.
      - targets: ['localhost:9100', 'sb-staging:9100', 'sb-prod:9100', 'rp2-coordinator:9100']

  - job_name: 'app_server'
    static_configs:
      - targets: ['sb-staging:80', 'sb-prod:80']

  - job_name: 'server_rs'
    static_configs:
      - targets: ['sb-staging:8001', 'sb-prod:8001']

  # rp2-coordinator is the coordinator box's tailnet hostname (its
  # TAILSCALE_HOSTNAME; rp2-coordinator is only the sample default). The
  # production coordinator's target gets added once it stands up.
  - job_name: 'rp2_coordinator'
    static_configs:
      - targets: ['rp2-coordinator:14911']
