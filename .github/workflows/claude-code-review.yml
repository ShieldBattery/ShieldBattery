name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

            Review this pull request. The PR branch is already checked out.

            You are a senior staff engineer reviewing PRs with a critical eye. Focus only on
            issues worth fixing — don't praise, summarize, or nitpick.

            ## Before reviewing
            1. Read CLAUDE.md and AGENTS.md for project conventions
            2. Read the FULL file for any code you're about to comment on (not just the diff) —
               context matters
            3. Check `common/` for shared types that may be affected by changes
            4. If the PR references an issue, read it for additional context

            ## Review checklist
            - Potential bugs or logic errors
            - Security issues (XSS, injection, auth bypass)
            - Performance problems
            - API/interface misuse
            - Architecture violations (`client/`, `server/`, `app/` must not depend on each other)
            - If database migrations were added, verify corresponding SQLx query metadata
              (`pnpm sqlx-prepare` may need to be run)
            - If GraphQL resolvers changed in `server-rs/`, verify schema was regenerated
            - If `common/ipc.ts` changed, check both `app/` and `client/` usage
            - For bug fixes and new features, note if tests are missing — but don't flag legacy
              code that already lacked coverage
            - URLs should use `urlPath`/`apiUrl` tagged templates, not raw string concatenation
            - styled-components props passed to DOM elements should use `$` prefix (transient props)

            ## Don't flag generated files
            Some files are generated by build commands and committed to the repo. Changes to these
            files in a PR are expected output, not manual edits. Do NOT flag changes to:
            - Translation files (`global.json`) — generated by `pnpm run gen-translations`
            - GraphQL types in `client/gql/` — generated by `pnpm run gen-graphql`
            - `common/typeshare.ts` — generated by `pnpm run gen-typeshare`
            - `schema.graphql` — generated from server-rs code

            ## Before commenting on any issue
            - Read enough surrounding code to understand the full context
            - Check if the pattern exists elsewhere in the codebase — if so, it's probably
              intentional
            - Verify your suggestion actually works given imports, types, and dependencies
            - If you're unsure, don't comment — false positives waste the author's time

            ## Feedback format
            - 1-2 sentences max per issue
            - Include a specific fix with code blocks when possible
            - Use `gh pr comment` for top-level feedback
            - Use `mcp__github_inline_comment__create_inline_comment` for inline comments on
              specific lines

            If everything looks good, just comment: "gg, ship it"

          claude_args: |
            --allowedTools "Read,Glob,Grep,WebFetch,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git log:*),Bash(git blame:*)"
            --model "claude-opus-4-6"
